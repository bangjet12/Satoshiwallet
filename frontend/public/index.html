<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#0a0a0a" />
        <meta name="description" content="Satoshi — a minimal Bitcoin Lightning wallet" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Satoshi" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
        <title>Satoshi — Lightning Wallet</title>
        <style>
            html, body { background: #0a0a0a; }
            /* hide any emergent badge in case it gets injected at runtime */
            #emergent-badge, a[href*="emergent.sh"][id="emergent-badge"] { display: none !important; }
        </style>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script>
            // Defensive: remove the Made-with-Emergent badge if it gets injected by any runtime script
            (function () {
                var stripBadge = function () {
                    var el = document.getElementById("emergent-badge");
                    if (el && el.parentNode) {
                        el.parentNode.removeChild(el);
                    }
                };
                if (document.readyState === "loading") {
                    document.addEventListener("DOMContentLoaded", stripBadge);
                } else {
                    stripBadge();
                }
                // Watch the DOM in case the badge is added later by an external script
                try {
                    var obs = new MutationObserver(function (mutations) {
                        mutations.forEach(function (m) {
                            m.addedNodes && m.addedNodes.forEach(function (n) {
                                if (n && n.id === "emergent-badge") {
                                    if (n.parentNode) n.parentNode.removeChild(n);
                                }
                            });
                        });
                    });
                    obs.observe(document.documentElement, { childList: true, subtree: true });
                    // safety: stop the observer after 30s to avoid wasting cycles
                    setTimeout(function () { try { obs.disconnect(); } catch (e) {} }, 30000);
                } catch (e) {}
            })();
        </script>
    </body>
</html>
